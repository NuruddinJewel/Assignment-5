 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment_05</title>
    <!-- Title and logo  -->
    <link rel="stylesheet" href="./assets/logo.png">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <!--Css Style-->
    <link rel="stylesheet" href="styles.css">
    <!-- Font Integration -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
 <header id="loginSection" class="flex items-center justify-center min-h-screen bg-base-200"> 
        <!-- Login Section  -->
         <nav class="flex items-center justify-center min-h-screen bg-base-200" id="loginSection">
            <div class="w-full max-w-xs">
                <fieldset class="fieldset bg-base-100 border-base-100 rounded-box border p-6 shadow-sm">
                    <img src="./assets/github-logo.png" class="w-24 h-24 mx-auto" alt="GitHub Logo">
                    <h2 class="font-semibold text-lg text-center">GitHub Issues Tracker</h2>
                    <p class="text-center text-xs">Sign in to manage your issues</p>  
                    <label class="text-black text-sm mt-2">Username</label>
                    <input type="text" class="input input-bordered" id="username" placeholder="Enter Username" />
                    <label class="text-black text-sm mt-2">Password</label>
                    <input type="password" class="input input-bordered" id="password" placeholder="Enter Password" />
                    <button class="btn btn-primary mt-6" id="signInBtn">Sign In</button>
                    <p id="loginMessage" class="text-red-500 text-sm text-center mt-2 hidden"></p>
                </fieldset>
            </div>
        </nav>
    </header> 

    <!-- DASHBOARD SECTION (Initially Hidden) -->
    <main id="dashboardSection" class="hidden">
        <!-- 1. Top Navbar -->
        <div class="navbar bg-base-100 shadow-sm px-4 lg:px-[240px]">
            <div class="flex-1">
                <a class="btn btn-ghost gap-2 text-xl">
                    <img src="./assets/github-logo.png" class="w-6 h-6">
                    <span>GitHub Issues Tracker</span>
                </a>
            </div>
            <!-- <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="Search issues..." class="input input-bordered input-sm w-32 md:w-auto" />
                <button id="searchBtn" class="btn btn-primary btn-sm">Search</button>
            </div> -->
             <div class="flex gap-2">
        <label class="input input-bordered flex items-center gap-2 w-32 md:w-auto">
            <i class="fa-solid fa-magnifying-glass opacity-50"></i>
            <input type="text" class="grow"id="searchInput"  placeholder="Search issues..." />
        </label>
        <button class="btn btn-primary" id="searchBtn">
            <i class="fa-solid fa-plus"></i>
            <span class="hidden md:inline">New issue</span>
        </button>
    </div>
        </div>

        <!-- 2. Filter Buttons -->
        <div class="mt-8 px-4 lg:px-[240px]">
            <div class="navbar bg-base-100 shadow-sm rounded-xl border border-base-200 px-4 gap-2">
                <button class="btn btn-primary btn-sm btn-outline" id="btnAll">All</button>
                <button class="btn btn-primary btn-sm btn-outline" id="btnOpen">Open (0)</button>
                <button class="btn btn-primary btn-sm btn-outline" id="btnClosed">Closed (0)</button>
            </div>
        </div>

        <!-- 3. Status Display -->
        <div class="mt-4 px-4 lg:px-[240px]">
            <div class="bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center">
                <h2 class="font-bold text-lg" id="issueHeadline">Loading issues...</h2>
                <div class="flex gap-4 text-sm">
                    <span class="text-success font-bold">● Open</span>
                    <span class="text-purple-600 font-bold">● Closed</span>
                </div>
            </div>
        </div>

        <!-- 4. Grid Container -->
        <div class="mt-6 px-4 lg:px-[240px] pb-12">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="issuesContainer"></div>
        </div>
    </main>

    <!-- DAISY UI MODAL -->
    <dialog id="issueDetailModal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl" id="modalBody"></div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>

    <script src="./script/index.js"></script>
</body>
</html>
