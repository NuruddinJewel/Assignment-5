<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practise</title>
    <!-- Title and logo -->
    <link rel="stylesheet" href="./assets/logo.png">
    <!-- Font Awesome - corrected version -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!--Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!--Css Style-->
    <link rel="stylesheet" href="styles.css">
    <!-- Font Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC] min-h-screen">
    <header>
        <!-- Login Section -->
        <nav class="flex items-center justify-center min-h-screen bg-base-200" id="loginSection">
            <div class="w-full max-w-xs">
                <fieldset class="fieldset bg-base-100 border-base-100 rounded-box border p-6 shadow-sm">
                    <img src="./assets/github-logo.png" class="w-24 h-24 mx-auto" alt="GitHub Logo">
                    <h2 class="font-semibold text-lg text-center">GitHub Issues Tracker</h2>
                    <p class="text-center text-xs">Sign in to manage your issues</p>  
                    <label class="text-black text-sm mt-2">Username</label>
                    <input type="text" class="input input-bordered" id="username" placeholder="Enter Username" />
                    <label class="text-black text-sm mt-2">Password</label>
                    <input type="password" class="input input-bordered" id="password" placeholder="Enter Password" />
                    <button class="btn btn-primary mt-6" id="signInBtn">Sign In</button>
                    <p id="loginMessage" class="text-red-500 text-sm text-center mt-2 hidden"></p>
                </fieldset>
            </div>
        </nav>
    </header>

    <main>
        <!-- Main Dashboard Section (Initially Hidden) -->
        <section id="dashboardSection" class="hidden">
            <div class="navbar bg-base-100 shadow-sm px-4">
                <div class="flex-1">
                    <a class="btn btn-ghost gap-2 text-xl">
                        <img src="./assets/github-logo.png" class="w-6 h-6" alt="GitHub Logo">
                        <span>GitHub Issues Tracker</span>
                    </a>
                </div>
                <div class="flex gap-2">
                    <label class="input input-bordered flex items-center gap-2 w-32 md:w-auto">
                        <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                        <input type="text" class="grow" placeholder="Search issues..." />
                    </label>
                    <div class="dropdown dropdown-end">
                        <button class="btn btn-primary">
                            <i class="fa-solid fa-plus"></i>
                            <span class="hidden md:inline">New issue</span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Dashboard Content -->
        </section>
    </main>
    <footer>
    </footer>
    
    <!-- Link to JavaScript file -->
    <script src="./script/index.js"></script>
</body>
</html>
