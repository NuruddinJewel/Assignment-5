 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment_05</title>
    <!-- Title and logo  -->
    <link rel="stylesheet" href="./assets/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> 
    <!-- Tailwind and DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <!--Css Style-->
    <link rel="stylesheet" href="styles.css">
    <!-- Font Integration -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC]">
    <!-- Login Section -->
    <header id="loginSection" class="flex items-center justify-center min-h-screen bg-base-200 p-4">
    <div class="w-full max-w-xs bg-white rounded-lg p-6 shadow-sm border border-gray-100">
        <!-- Logo and Title -->
        <div class="text-center mb-6">
            <img src="./assets/github-logo.png" class="w-20 h-20 mx-auto mb-2" alt="GitHub Logo">
            <h2 class="text-2xl font-bold text-gray-800">GitHub Issues Tracker</h2>
            <p class="text-gray-400 text-sm mt-1">Sign in to manage your issues</p>
        </div>
        <!-- Form Fields -->
        <div class="space-y-4">
            <div class="form-control">
                <label class="label pb-1">
                    <span class="label-text font-semibold text-gray-700">Username</span>
                </label>
                <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full bg-white border-gray-200 focus:border-violet-500 rounded-xl" />
                <span class="text-[10px] text-violet-600 mt-1 ml-1">Default: admin</span>
            </div>
            <div class="form-control">
                <label class="label pb-1">
                    <span class="label-text font-semibold text-gray-700">Password</span>
                </label>
                <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full bg-white border-gray-200 focus:border-violet-500 rounded-xl" />
                <span class="text-[10px] text-violet-600 mt-1 ml-1">Default: admin123</span>
            </div>
            <!-- Sign In Button -->
            <button id="signInBtn" class="btn w-full mt-4 bg-[#4B00FF] hover:bg-[#3A00CC] text-white border-none rounded-xl h-10 text-lg">
                Sign In
            </button>
            <p id="loginMessage" class="text-red-500 text-xs text-center mt-2 hidden"></p>
        </div>
        <!-- OR Divider -->
        <div class="divider text-[10px] text-gray-400 my-4">OR</div>
        <!-- Demo Credentials Box -->
        <div class="text-center">
            <p class="text-[10px] text-gray-400 mb-2">Demo Credentials:</p>
            <div class="bg-[#F8F9FD] rounded-2xl p-4 text-xs">
                <p class="text-gray-600"><b class="text-gray-800">Username:</b> admin</p>
                <p class="text-gray-600"><b class="text-gray-800">Password:</b> admin123</p>
            </div>
        </div>
    </div>
</header>
    <!-- DASHBOARD SECTION (Initially Hidden) -->
    <main id="dashboardSection" class="hidden">
        <!-- 1. Top Navbar -->
        <section>
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-10 xl:px-20">
            <div class="flex-1">
                <a class="btn btn-ghost gap-2 text-xl">
                    <img src="./assets/github-logo.png" class="w-6 h-6">
                    <span>GitHub Issues Tracker</span>
                </a>
            </div>
        <div class="flex gap-2">
    <label class="input input-bordered flex items-center gap-2 w-32 md:w-auto">
        <i class="fa-solid fa-magnifying-glass opacity-50"></i>
        <!-- Search input for dynamic typing -->
        <input type="text" class="grow" id="searchInput" placeholder="Search issues..." />
    </label>
    <!-- New Issue Button opens the modal -->
    <button class="btn btn-primary" onclick="newIssueModal.showModal()">
        <i class="fa-solid fa-plus"></i>
        <span class="hidden md:inline">New issue</span>
    </button>
    </div>
<!-- NEW ISSUE MODAL -->
<dialog id="newIssueModal" class="modal">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Create New Issue</h3>
        <form id="newIssueForm" class="space-y-4">
            <input type="text" id="newTitle" placeholder="Issue Title" class="input input-bordered w-full" required />
            <textarea id="newDesc" placeholder="Description" class="textarea textarea-bordered w-full" required></textarea>
            <div class="flex gap-2">
                <select id="newPriority" class="select select-bordered w-full">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <input type="text" id="newAuthor" placeholder="Your Name" class="input input-bordered w-full" required />
            </div>
            <div class="modal-action">
                <button type="button" class="btn" onclick="newIssueModal.close()">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Issue</button>
            </div>
        </form>
    </div>
</dialog>
</div>
  <!-- 2. Filter Buttons -->
<div class="mt-8 px-4 md:px-10 xl:px-20">
        <div class="navbar bg-base-100 shadow-sm rounded-xl border border-base-200 px-8 gap-2">
            <button class="btn btn-primary btn-sm btn-outline" id="btnAll">All</button>
             <button class="btn btn-primary btn-sm btn-outline" id="btnOpen">Open (0)</button>
             <button class="btn btn-primary btn-sm btn-outline" id="btnClosed">Closed (0)</button>
        </div>
</div>
 <!-- 3. Status Display -->
<div class="mt-4 px-4 md:px-10 xl:px-20 bg-[#F8FAFC]">
 <!-- Main Header Card -->
<div class="bg-white p-4 rounded-xl border border-gray-200 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="./assets/Aperture.png" class="w-10 h-10 bg-violet-100 p-2 rounded-full" alt="Aperture">      
            <div class="flex flex-col">
                <h2 class="font-bold text-xl text-gray-800 leading-none" id="issueHeadline">Loading issues...</h2>
                <p class="text-sm text-gray-400 font-normal mt-1">Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex gap-4 text-sm">
            <span class="text-success font-bold">● Open</span>
            <span class="text-purple-600 font-bold">● Closed</span>
        </div>    
    </div>
</div>
    <!-- 4. Grid Container -->
        <div class="mt-6 px-4 md:px-10 xl:px-20 pb-12">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="issuesContainer">
        <!-- Cards will be injected here by JS -->
    </div>
</div>
    </section>
<!-- Spinner -->
    <section id="spin" class="flex justify-center items-center py-8 hidden">
            <span class="loading loading-spinner text-success"></span>
    </section>
    </main>
    <!-- DAISY UI MODAL -->
    <dialog id="issueDetailModal" class="modal">
        <div class="modal-box w-11/12 max-w-2xl" id="modalBody"></div>
        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
    <script src="./script/index.js"></script>
</body>
</html>
